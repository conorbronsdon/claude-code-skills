# Proposed .ssot.yaml for cot-production — output of a real discover-mode run, 2026-06-11.
# This is the draft the skill produced for human review. It was NOT written to the
# audited repo (discover mode never writes the manifest without approval).
#
# Repo context: CLAUDE.md's "Single Source of Truth" section was used as the
# canonical-file oracle. Two surfaces are auto-generated by scripts/podcast-metrics.py
# (docs/data.json, parts of outputs/episodes/README.md) and one sibling repo
# (../cot-sponsor-page) is auto-synced from data.json by its scripts/sync-stats.mjs.
# Paths use forward slashes; sibling repo paths are relative to this repo's root.

facts:
  - name: episode-count
    note: >
      Total published episodes, EXCLUDING the trailer (repo convention; Transistor
      auto-assigns numbers, trailer is type "trailer"). Counting convention matters:
      the live drift found during discovery was a convention bug, not a stale edit —
      see discovery-report.md.
    canonical:
      file: outputs/episodes/README.md
      pattern: '\*\*Total Episodes:\*\* (\d+)'
    copies:
      - file: docs/data.json
        pattern: '"episodes_published": (\d+)'
        note: >
          auto-generated by scripts/podcast-metrics.py (twice-daily GH Action).
          Fix proposals point at the script, not this file. DRIFTED at discovery:
          script writes the trailer-INCLUSIVE count here (63) while it writes the
          no-trailer count (62) to the README — internal inconsistency in the
          pipeline itself.
      - file: ../cot-sponsor-page/index.html
        pattern: 'data-stat="episodes_published">(\d+)\+?<'
        note: >
          auto-synced from data.json by sync-stats.mjs on deploy; matches 3x in the
          file (trust bar, stat grid, about blurb) — first match checked. Inherits
          the data.json trailer bug (shows 63+).

  - name: all-time-reach
    note: >
      Combined downloads + YouTube views ("Combined Reach"). AUTO-GENERATED end to
      end — never hand-edit any surface. Tracking it here makes check mode double as
      a pipeline health check. Don't call it "streams."
    canonical:
      file: docs/data.json
      pattern: '"combined_reach": (\d+)'
    copies:
      - file: outputs/episodes/README.md
        pattern: '\*\*All-Time Views & Downloads:\*\* ([\d,]+)\+'
        rounding: floor-1000
        note: auto-written by scripts/podcast-metrics.py, floored to the nearest 1,000.
      - file: ../cot-sponsor-page/index.html
        pattern: 'data-stat="combined_reach">(\d+)K\+<'
        rounding: floor-1000-as-K
        note: >
          auto-synced by sync-stats.mjs on deploy; rendered as NNNK+. A mismatch
          here usually means the sponsor page hasn't redeployed since the last
          metrics run (observed: 155K+ vs canonical 156,703 — two-day sync lag).

  - name: youtube-subscribers
    note: AUTO-GENERATED in data.json; sponsor-page stat is auto-synced, but the page's meta description and JSON-LD blob are hand-written and drift independently.
    canonical:
      file: docs/data.json
      pattern: '"youtube_subscribers": (\d+)'
    copies:
      - file: ../cot-sponsor-page/index.html
        pattern: 'data-stat="youtube_subscribers">([\d,]+)\+?<'
        rounding: floor-10
        note: auto-synced by sync-stats.mjs; rendered floored to nearest 10 with "+".
      - file: ../cot-sponsor-page/index.html
        pattern: 'reaching ([\d,]+)\+ YouTube subscribers'
        rounding: floor-10
        note: hand-written meta description — no data-stat anchor, sync script updates it by literal phrase.
      - file: ../cot-sponsor-page/index.html
        pattern: 'Audience of ([\d,]+)\+ YouTube subscribers'
        rounding: floor-10
        note: hand-written JSON-LD description.

  - name: newsletter-subscribers
    note: Substack subscriber count. data.json is auto-generated; all copies below are hand-written.
    canonical:
      file: docs/data.json
      pattern: '"newsletter_subscribers": (\d+)'
    copies:
      - file: ../cot-sponsor-page/index.html
        pattern: 'newsletter\.chainofthought\.show/"[^>]*>\s*<span class="number">([\d,]+)\+</span>\s*<span class="label">Newsletter subscribers'
        rounding: floor-100
        note: stat-grid value has NO data-stat attribute (hand-maintained); anchored on the link href because the label sits on the next line.
      - file: ../cot-sponsor-page/index.html
        pattern: '([\d,]+)\+ newsletter readers'
        rounding: floor-100
        note: matches 2x (meta description + JSON-LD), first match checked.
      - file: host-context.md
        pattern: '\*\*Substack:\*\* ([\d,]+)\+ subscribers'
        note: 'DRIFTED at discovery: said 870+ while canonical was 1,000.'

  - name: linkedin-followers
    note: >
      Conor's personal LinkedIn followers. NOT on the dashboard — no auto-generated
      source exists, so canonical is the file CLAUDE.md names for host background.
      At discovery the proposed CANONICAL was the stale side (10,000+) and the copy
      (12,000+) was fresher — monotonic-metric heuristic says suspect the canonical.
      Human must confirm the true value and which file leads before approving.
    canonical:
      file: host-context.md
      pattern: '\*\*LinkedIn:\*\* ([\d,]+)\+ followers'
    copies:
      - file: ../cot-sponsor-page/index.html
        pattern: 'linkedin\.com/in/conorbronsdon/"[^>]*>\s*<span class="number">([\d,]+)\+</span>\s*<span class="label">LinkedIn followers'

  - name: sponsor-price-starter
    note: >
      Per-episode rate, 4-episode flight. CROSS-REPO CANONICAL: sponsorship/media-kit.md
      explicitly delegates the media kit to the live sponsor page, so the landing page
      IS the source of record for pricing (exception to "marketing pages are never
      canonical"). Pull ../cot-sponsor-page fresh before checking.
    canonical:
      file: ../cot-sponsor-page/index.html
      pattern: '4 episodes · \$(\d+)/ep'
    copies:
      - file: skills/cot-sponsor-package/SKILL.md
        pattern: '\| Standard \| \$(\d+) \|'
        note: >
          STALE at discovery: the skill template still carries the previous tier
          table (old names AND old rates), so every newly generated sponsor package
          quotes superseded pricing. Fix is a rewrite of the template table, not a
          number swap.

  - name: sponsor-price-presenting
    note: Per-episode rate, 12-episode presenting tier. Same cross-repo canonical as sponsor-price-starter.
    canonical:
      file: ../cot-sponsor-page/index.html
      pattern: '12 episodes · \$(\d+)/ep'
    copies:
      - file: skills/cot-sponsor-package/SKILL.md
        pattern: '\| Quarterly \| \$(\d+) \|'
        note: STALE at discovery — see sponsor-price-starter.

  - name: listeners-per-episode
    note: >
      Public "1,000+ listeners per episode" claim. All occurrences live in the
      sponsor page; canonical is the stat-grid value, copies are the hand-written
      meta description and JSON-LD in the SAME file (same-file copies are allowed —
      they drift from each other in practice).
    canonical:
      file: ../cot-sponsor-page/index.html
      pattern: '<span class="number">([\d,]+)\+</span>\s*<span class="label">Listeners per episode'
    copies:
      - file: ../cot-sponsor-page/index.html
        pattern: '([\d,]+)\+ listeners per episode'
        note: JSON-LD description.
